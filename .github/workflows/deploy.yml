name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate companies.js (quick syntax check)
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('data/companies.js','utf8');
            // Check COMPANIES array is accessible
            eval(src);
            console.log('✅ companies.js syntax OK —', COMPANIES.length, 'companies');
            const active = COMPANIES.filter(c => c.active !== false);
            console.log('   Active:', active.length, '| Inactive:', COMPANIES.length - active.length);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
